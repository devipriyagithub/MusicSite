<!DOCTYPE html>
<html>
<head>
    <title>Secret Music</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    transition: background 0.5s ease;
    background-size: cover;
    background-position: center;
  }

  .bg1 {
    background-image: url('Goku.jpg');
  }

  .bg2 {
    background-image: url('Gojo.jpg');
  }

  .bg3 {
    background-image: url('Luffy.jpg');
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    background: #ff5500;
    color: white;
    cursor: pointer;
  }

  #content {
    display: none;
    padding: 20px;
    background: rgba(0,0,0,0.6); /* makes text readable */
  }
</style>
        
</head>

<body class="bg1">

<button onclick="changeBg('bg1')">Goku</button>
<button onclick="changeBg('bg2')">Gojo</button>
<button onclick="changeBg('bg3')">Luffy</button>

    
    <div class="container" id="login">
        <h2>Enter 3-digit password 🔐</h2>
        <input type="password" id="pass" maxlength="3"><br>
        <button onclick="checkPass()">Enter</button>
    </div>

    <div id="content">
        <h2>🎧 Welcome</h2>

        <p>Sky – Playboi Carti</p>
        <audio controls>
            <source src="sky.mp3" type="audio/mpeg">
        </audio>

        <p>Superhero – Metro Boomin, Future, Chris Brown</p>
        <audio controls>
            <source src="superhero.mp3" type="audio/mpeg">
        </audio>

    </div>

    <script>
function checkPass() {
  let password = document.getElementById("pass").value;

  if(password === "347") {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
        function changeBg(bg) {
  document.body.className = bg;
}
    </script>

</body>
</html>
